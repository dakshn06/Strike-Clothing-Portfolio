<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Strike Apparel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="intro">
    <p class="eyebrow">Selected Work</p>
    <h1>Strike — Anime Apparel</h1>
    <p class="lead">
      Streetwear design &amp; storefront concept. Product graphics, mockups and a
      landing-page UI for an anime-inspired clothing brand.
    </p>
    <ul class="tags">
      <li>Graphic Design</li>
      <li>Product Mockup</li>
      <li>Web UI</li>
    </ul>
  </header>

  <main class="gallery">
    <figure class="item">
      <div class="frame">
        <img src="images/sukuna%20tee.png" alt="Honored One tee — product visual" />
      </div>
      <figcaption>
        <h2>Honored One Tee</h2>
        <p>Product key visual — composite mockup &amp; lighting</p>
      </figcaption>
    </figure>

    <figure class="item">
      <div class="frame">
        <img src="images/32.png" alt="Heart Ablaze tee — apparel design" />
      </div>
      <figcaption>
        <h2>Heart Ablaze Tee</h2>
        <p>Apparel graphic — print design on garment mockup</p>
      </figcaption>
    </figure>

    <figure class="item">
      <div class="frame light">
        <img src="images/Screenshot_2026-06-21_232132.png" alt="Strike storefront landing page UI" />
      </div>
      <figcaption>
        <h2>Storefront Landing Page</h2>
        <p>E-commerce UI concept — hero &amp; navigation design</p>
      </figcaption>
    </figure>

    <figure class="item">
      <div class="frame">
        <img src="images/hinokami%20gif.gif" alt="Hinokami flame motion graphic" />
      </div>
      <figcaption>
        <h2>Hinokami Drop — Motion</h2>
        <p>Animated promo graphic — flame VFX loop</p>
      </figcaption>
    </figure>
  </main>

  <footer class="foot">
    <p>Strike Apparel — Portfolio Sample</p>
  </footer>
</body>
</html>
